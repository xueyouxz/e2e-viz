name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DEPLOY_HEALTH_URL: http://127.0.0.1:3001/
  # Force all actions to run on Node.js 24 runtime (required from 2026-06-02)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── CI: lint · unit tests · build ──────────────────────────────────────────
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@10.27.0 --activate

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "dir=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Style lint
        run: pnpm lint:style

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  # ── CD: build & push Docker image to GHCR (main branch only) ───────────────
  cd:
    name: CD
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: production
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sync docker-compose.yml to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: docker-compose.yml
          target: /opt/e2e-viz/
          overwrite: true

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -eu
            IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
            COMPOSE_BASE="/opt/e2e-viz/docker-compose.yml"
            OVERRIDE_FILE="/tmp/e2e-viz-image.override.yml"
            ROLLBACK_FILE="/tmp/e2e-viz-rollback.override.yml"
            HEALTH_URL="${{ env.DEPLOY_HEALTH_URL }}"

            # Record the currently-running image before the update so we can
            # roll back if the new version fails its health check.
            PREV_CONTAINER=$(docker compose -f "${COMPOSE_BASE}" ps -q app 2>/dev/null || true)
            PREV_IMAGE=$(docker inspect "${PREV_CONTAINER}" \
              --format='{{.Config.Image}}' 2>/dev/null || true)

            cat > "${OVERRIDE_FILE}" <<EOF
            services:
              app:
                image: ${IMAGE_REF}
            EOF

            docker compose -f "${COMPOSE_BASE}" -f "${OVERRIDE_FILE}" pull app
            docker compose -f "${COMPOSE_BASE}" -f "${OVERRIDE_FILE}" up -d app

            healthcheck() {
              if command -v curl >/dev/null 2>&1; then
                curl -fsS "${HEALTH_URL}" >/dev/null
              else
                wget -q --spider "${HEALTH_URL}"
              fi
            }

            for attempt in $(seq 1 30); do
              if healthcheck; then
                # Remove old images for this project only (keep current SHA and latest).
                docker images "ghcr.io/xueyouxz/e2e-viz" \
                  --format "{{.ID}}\t{{.Tag}}" \
                  | grep -v -E "(sha-${{ github.sha }}|latest)" \
                  | awk '{print $1}' | sort -u \
                  | xargs -r docker rmi 2>/dev/null || true
                exit 0
              fi
              sleep 2
            done

            echo "::error::Health check failed after 30 attempts."
            docker compose -f "${COMPOSE_BASE}" -f "${OVERRIDE_FILE}" ps
            docker compose -f "${COMPOSE_BASE}" -f "${OVERRIDE_FILE}" logs --tail=100 app

            # Roll back to the previous image if one was recorded.
            if [ -n "${PREV_IMAGE}" ] && [ "${PREV_IMAGE}" != "${IMAGE_REF}" ]; then
              echo "Rolling back to ${PREV_IMAGE} ..."
              cat > "${ROLLBACK_FILE}" <<EOF
            services:
              app:
                image: ${PREV_IMAGE}
            EOF
              docker compose -f "${COMPOSE_BASE}" -f "${ROLLBACK_FILE}" up -d app
              echo "Rollback complete."
            fi
            exit 1
