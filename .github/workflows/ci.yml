name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DEPLOY_HEALTH_URL: http://127.0.0.1:3001/
  # Force all actions to run on Node.js 24 runtime (required from 2026-06-02)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── CI: lint · unit tests · build · e2e ────────────────────────────────────
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@10.27.0 --activate

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "dir=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Style lint
        run: pnpm lint:style

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  # ── CD: build & push Docker image to GHCR (main branch only) ───────────────
  cd:
    name: CD
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: production
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -eu
            IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
            OVERRIDE_FILE="/tmp/e2e-viz-image.override.yml"
            HEALTH_URL="${{ env.DEPLOY_HEALTH_URL }}"

            cat > "${OVERRIDE_FILE}" <<EOF
            services:
              app:
                image: ${IMAGE_REF}
            EOF

            docker compose -f /opt/e2e-viz/docker-compose.yml -f "${OVERRIDE_FILE}" pull app
            docker compose -f /opt/e2e-viz/docker-compose.yml -f "${OVERRIDE_FILE}" up -d app

            healthcheck() {
              if command -v curl >/dev/null 2>&1; then
                curl -fsS "${HEALTH_URL}" >/dev/null
              else
                wget -q --spider "${HEALTH_URL}"
              fi
            }

            for attempt in $(seq 1 30); do
              if healthcheck; then
                docker image prune -f
                exit 0
              fi
              sleep 2
            done

            docker compose -f /opt/e2e-viz/docker-compose.yml -f "${OVERRIDE_FILE}" ps
            docker compose -f /opt/e2e-viz/docker-compose.yml -f "${OVERRIDE_FILE}" logs --tail=100 app
            exit 1
