server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        image/svg+xml
        image/webp;

    # Security headers applied to every response.
    # nginx add_header is NOT inherited when a location block has its own
    # add_header directives, so these are repeated in each location below.
    add_header X-Frame-Options              "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options       "nosniff"                             always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()" always;
    # HSTS — BaoTa reverse-proxy terminates TLS and forwards this header to clients.
    # Start without includeSubDomains until all subdomains of e2eval.top are HTTPS-ready.
    add_header Strict-Transport-Security    "max-age=31536000"                    always;
    # CSP for Vite SPA + Three.js + Web Workers:
    #   worker-src blob: — Vite may bundle workers as blob: URLs in some configurations
    #   img-src    blob: — URL.createObjectURL() for camera/raster image payloads
    #   img-src    data: — occasional data: URIs from Three.js textures
    #   style-src 'unsafe-inline' — React/Three.js may inject inline <style> tags at runtime
    add_header Content-Security-Policy      "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' blob: data:; connect-src 'self' blob:; worker-src 'self' blob:; font-src 'self' https://fonts.gstatic.com; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # Scene frame binaries — large files, no transform, long cache
    location ~* ^/data/scenes/.*\.bin$ {
        add_header Cache-Control                "public, max-age=31536000, immutable";
        add_header Content-Type                 "application/octet-stream";
        add_header X-Frame-Options              "SAMEORIGIN"                          always;
        add_header X-Content-Type-Options       "nosniff"                             always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin"     always;
        add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security    "max-age=31536000"                    always;
        gzip off;
    }

    # GLB files (metadata + ego model) — immutable per scene
    location ~* \.(glb)$ {
        add_header Cache-Control                "public, max-age=31536000, immutable";
        add_header Content-Type                 "model/gltf-binary";
        add_header X-Frame-Options              "SAMEORIGIN"                          always;
        add_header X-Content-Type-Options       "nosniff"                             always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin"     always;
        add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security    "max-age=31536000"                    always;
        gzip off;
    }

    # JSON data files — revalidate on each request (data may be refreshed)
    location ~* ^/data/.*\.json$ {
        add_header Cache-Control                "public, max-age=3600, must-revalidate";
        add_header X-Frame-Options              "SAMEORIGIN"                          always;
        add_header X-Content-Type-Options       "nosniff"                             always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin"     always;
        add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security    "max-age=31536000"                    always;
    }

    # Glyph images
    location ~* ^/data/glyphs/.*\.webp$ {
        add_header Cache-Control                "public, max-age=86400";
        add_header X-Frame-Options              "SAMEORIGIN"                          always;
        add_header X-Content-Type-Options       "nosniff"                             always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin"     always;
        add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security    "max-age=31536000"                    always;
    }

    # SPA fallback — all non-file paths hand off to React Router.
    # No add_header here, so server-level security headers (including CSP) are inherited.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed JS/CSS/image assets for 1 year (filenames contain content hash)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control                "public, immutable";
        add_header X-Frame-Options              "SAMEORIGIN"                          always;
        add_header X-Content-Type-Options       "nosniff"                             always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin"     always;
        add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security    "max-age=31536000"                    always;
    }
}
