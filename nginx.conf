server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        image/svg+xml
        image/webp;

    # Scene frame binaries — large files, no transform, long cache
    location ~* ^/data/scenes/.*\.bin$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Content-Type "application/octet-stream";
        gzip off;
    }

    # GLB files (metadata + ego model) — immutable per scene
    location ~* \.(glb)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Content-Type "model/gltf-binary";
        gzip off;
    }

    # JSON data files — revalidate on each request (data may be refreshed)
    location ~* ^/data/.*\.json$ {
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    # Glyph images
    location ~* ^/data/glyphs/.*\.webp$ {
        add_header Cache-Control "public, max-age=86400";
    }

    # SPA fallback — all non-file paths hand off to React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed JS/CSS/image assets for 1 year (filenames contain content hash)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
