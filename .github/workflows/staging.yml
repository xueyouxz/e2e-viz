name: Staging

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  STAGING_HEALTH_URL: http://127.0.0.1:3002/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

concurrency:
  group: staging-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── CI: same gates as production ───────────────────────────────────────────
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@10.27.0 --activate

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "dir=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Style lint
        run: pnpm lint:style

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-staging
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 3

  # ── CD: build & push staging image, deploy to staging server ───────────────
  cd:
    name: CD (staging)
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: staging
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push staging image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop-sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sync docker-compose.staging.yml to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: docker-compose.staging.yml
          target: /opt/e2e-viz-staging/
          overwrite: true

      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -eu
            IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop-sha-${{ github.sha }}"
            COMPOSE_BASE="/opt/e2e-viz-staging/docker-compose.staging.yml"
            OVERRIDE_FILE="/tmp/e2e-viz-staging-image.override.yml"
            HEALTH_URL="${{ env.STAGING_HEALTH_URL }}"

            cat > "${OVERRIDE_FILE}" <<EOF
            services:
              app:
                image: ${IMAGE_REF}
            EOF

            docker compose -f "${COMPOSE_BASE}" -f "${OVERRIDE_FILE}" pull app
            docker compose -f "${COMPOSE_BASE}" -f "${OVERRIDE_FILE}" up -d app

            healthcheck() {
              if command -v curl >/dev/null 2>&1; then
                curl -fsS "${HEALTH_URL}" >/dev/null
              else
                wget -q --spider "${HEALTH_URL}"
              fi
            }

            for attempt in $(seq 1 20); do
              if healthcheck; then
                docker images "ghcr.io/xueyouxz/e2e-viz" \
                  --format "{{.ID}}\t{{.Tag}}" \
                  | grep -v -E "(develop-sha-${{ github.sha }}|develop$|latest)" \
                  | awk '{print $1}' | sort -u \
                  | xargs -r docker rmi 2>/dev/null || true
                exit 0
              fi
              sleep 2
            done

            echo "::error::Staging health check failed."
            docker compose -f "${COMPOSE_BASE}" -f "${OVERRIDE_FILE}" logs --tail=50 app
            exit 1
